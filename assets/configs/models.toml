# ~/.config/8sync/models.toml — adaptive model routing for omp.
#
# PHILOSOPHY (8 Sync Dev):
#   Opus = việc cần TƯ DUY (plan · review · debug · ảnh/vision · suy luận sâu).
#   GLM  = việc CƠ HỌC ít logic (code · edit · đọc file · xoá · default · trivial).
#
# 8sync classifies each `8sync ai "<prompt>"` into a task class and passes the
# matching model to omp via `--model`. omp resolves the name against its own
# catalog with fuzzy matching, so short names work: "glm", "opus", "haiku",
# "codex", or a full "provider/model-id". The [roles] models are passed as
# --plan / --smol / --slow so omp's OWN routing uses your picks too.
#
# Edit freely (or via `8sync harness model <key> <value>`). "" = let omp decide.
# Override one call:  8sync ai --model opus "review this PR"
#
# Vision/ảnh: omp has no --vision CLI flag, so set it in omp's own config:
#   ~/.omp/agent/config.yml →  modelRoles: { vision: opus }   (images → Opus)

[roles]
default = "glm"     # main working model — code/edit/read/delete (mechanical) → GLM
plan    = "opus"    # architectural planning → Opus (deep thinking)
smol    = "glm"     # cheap/fast: titles + memory (mechanical) → GLM
slow    = "opus"    # deep reasoning / hard bugs → Opus

[tasks]
# Prompt class → model. Classes detected heuristically: plan | review | debug | code | trivial
plan    = "opus"    # planning            → thinking → Opus
review  = "opus"    # code review         → thinking → Opus
debug   = "opus"    # debugging           → thinking → Opus
code    = "glm"     # write/edit code     → mechanical → GLM
trivial = "glm"     # tiny mechanical ops → GLM
