# ~/.config/helix/config.toml — managed by 8sync setup
theme = "glass_black"

[editor]
line-number       = "relative"
mouse             = true
bufferline        = "multiple"
color-modes       = true
cursorline        = true
true-color        = true
auto-format       = true
auto-save         = true
completion-trigger-len = 1
idle-timeout      = 200
preview-completion-insert = true

[editor.cursor-shape]
insert  = "bar"
normal  = "block"
select  = "underline"

[editor.indent-guides]
render = true
character = "▏"

[editor.soft-wrap]
enable = true
max-wrap = 25
max-indent-retain = 0
wrap-indicator = "↪ "

[editor.statusline]
left  = ["mode", "spinner", "version-control", "file-name", "file-modification-indicator"]
center= ["diagnostics"]
right = ["selections", "position", "total-line-numbers", "file-encoding", "file-type"]

[editor.lsp]
display-messages = true
display-inlay-hints = true

[keys.normal]
space.q = ":quit"
space.w = ":write"
space.f = "file_picker"
space.b = "buffer_picker"
space.s = "symbol_picker"
space.g = ":sh lazygit"
space.t = ":sh 8sync ai"
"C-s"   = ":write"
