# 8sync end-4 glass theme
# =======================
# Aggressive Hyprland decoration tuned for a "neon dev" glass look.
# Sourced from userprefs.conf when `--end4=overlay` is active.
# Disable / tweak by editing ~/.config/hypr/8sync-end4-glass.conf.

general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    # Border colors come from the palette cycler (8sync-palette.conf).
    layout = dwindle
    resize_on_border = true
    hover_icon_on_border = true
}

decoration {
    rounding = 14

    active_opacity = 0.95
    inactive_opacity = 0.85
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 9
        passes = 4
        new_optimizations = true
        ignore_opacity = true
        xray = true
        noise = 0.02
        contrast = 1.1
        brightness = 1.0
        vibrancy = 0.25
        vibrancy_darkness = 0.4
        popups = true
        popups_ignorealpha = 0.4
    }

    shadow {
        enabled = true
        range = 32
        render_power = 4
        color = rgba(00000099)
        color_inactive = rgba(00000055)
    }
}

# Force common terminals to be translucent so the glass blur is visible.
# Hyprland windowrule v2 — applies to focused + unfocused.
windowrule = opacity 0.78 0.68, class:^(kitty)$
windowrule = opacity 0.85 0.75, class:^(foot)$
windowrule = opacity 0.85 0.75, class:^(Alacritty|alacritty)$
windowrule = opacity 0.85 0.75, class:^(org.wezfurlong.wezterm)$
windowrule = opacity 0.95 0.90, class:^(thunar|org.gnome.Nautilus)$
windowrule = opacity 0.92 0.85, class:^(code-oss|Code|cursor)$
windowrule = opacity 0.92 0.85, class:^(jetbrains-.*)$
windowrule = opacity 0.98 0.93, class:^(firefox|brave-browser|google-chrome|chromium)$

# Layer rules — make notifications/menus blurred too.
layerrule = blur, notifications
layerrule = blur, rofi
layerrule = blur, swaync-notification-window
layerrule = blur, swaync-control-center
layerrule = blur, ^(qs\..*)$
layerrule = ignorealpha 0.3, notifications
layerrule = ignorealpha 0.3, rofi

# Pull in the active palette (color values written by 8sync-palette-cycle.sh).
source = ~/.config/hypr/8sync-palette.conf
