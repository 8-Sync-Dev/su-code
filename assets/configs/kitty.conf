# ~/.config/kitty/kitty.conf — managed by 8sync setup
# Edit `~/.config/kitty/kitty.local.conf` for your overrides (auto-included).

# ─── Font ────────────────────────────────────────────────────────────
font_family       JetBrainsMono Nerd Font
bold_font         auto
italic_font       auto
bold_italic_font  auto
font_size         12.0
disable_ligatures never
modify_font cell_height 100%

# ─── Window ──────────────────────────────────────────────────────────
remember_window_size  yes
initial_window_width  120c
initial_window_height 36c
window_padding_width  6
hide_window_decorations yes
confirm_os_window_close 0

# ─── Cursor ──────────────────────────────────────────────────────────
cursor_shape         beam
cursor_blink_interval 0.5

# ─── Background ──────────────────────────────────────────────────────
background           #0b1220
background_opacity   0.85
dynamic_background_opacity yes
background_image     ~/.local/share/8sync/wallpapers/default.jpg
background_image_layout cscaled
background_image_linear yes
background_tint      0.85
background_tint_gaps 0.5

# ─── Tabs ────────────────────────────────────────────────────────────
tab_bar_style         powerline
tab_powerline_style   slanted
tab_bar_min_tabs      1
active_tab_foreground   #fff
active_tab_background   #2c3e50
inactive_tab_foreground #7f8c8d
inactive_tab_background #1a2530

# ─── Scrollback ──────────────────────────────────────────────────────
scrollback_lines       20000
scrollback_pager_history_size 100

# ─── Mouse ───────────────────────────────────────────────────────────
copy_on_select        yes
strip_trailing_spaces always
url_color             #38e7ff

# ─── Remote control (required by 8sync) ──────────────────────────────
allow_remote_control yes
listen_on            unix:@kitty
clipboard_control    write-clipboard write-primary read-clipboard read-primary

# ─── Keymap ──────────────────────────────────────────────────────────
map ctrl+shift+enter        new_window_with_cwd
map ctrl+shift+t            new_tab_with_cwd
map ctrl+shift+w            close_window
map ctrl+shift+q            close_tab
map ctrl+shift+]            next_window
map ctrl+shift+[            previous_window
map ctrl+shift+left         neighboring_window left
map ctrl+shift+right        neighboring_window right
map ctrl+shift+up           neighboring_window up
map ctrl+shift+down         neighboring_window down
map ctrl+shift+f            launch --type=overlay --stdin-source=@screen_scrollback fzf
map ctrl+shift+plus         change_font_size all +1.0
map ctrl+shift+minus        change_font_size all -1.0
map ctrl+shift+0            change_font_size all 0
map f11                     toggle_fullscreen

# 8sync verbs
map ctrl+shift+o            launch --type=overlay --cwd=current 8sync bg
map ctrl+shift+i            launch --type=overlay --cwd=current 8sync ai

# Include user overrides last
include kitty.local.conf
