# 8sync end-4 bridge keybinds
# ============================
# Curated subset of end-4 (illogical-impulse) keybinds that do NOT conflict
# with HyDE's keybindings.conf. Sourced from ~/.config/hypr/userprefs.conf
# while `qs -c ii` is running (managed by `8sync setup --end4=overlay`).
#
# Requires Quickshell config `ii` running. Without it, the `global,` binds
# silently no-op (Hyprland just doesn't fire the dispatch). The `exec,`
# binds still work.
#
# Conflicts intentionally OMITTED — HyDE wins:
#   Super+A      HyDE: rofi app finder      end-4: left sidebar (use Super+O instead)
#   Super+B      HyDE: web browser          end-4: left sidebar (use Super+O instead)
#   Super+J      HyDE: toggle split         end-4: toggle bar
#   Super+K      HyDE: keyboard layout      end-4: on-screen keyboard
#   Super+G      HyDE: toggle group         end-4: widget overlay
#   Super+/      HyDE: keybind hint         end-4: cheatsheet (use Super+Shift+/ for the merged hint)
#   Super+V      HyDE: cliphist popup       end-4: clipboard overview (same intent, HyDE wins)
#   Super+. (period)  HyDE: emoji picker    end-4: emoji overview (same intent, HyDE wins)
#   Super+Shift+S  HyDE: send to scratchpad end-4: region screenshot (use HyDE's Super+P)
#   Super+Shift+T  HyDE: select theme      end-4: screen translate (use Super+Shift+Alt+T)
#   Super+Shift+P  HyDE: color picker      end-4: play/pause (use Super+Shift+Space if needed)
#   Super+Shift+R  HyDE: wallbash selector end-4: record region (use Super+Alt+R)

# ─── AI / sidebars / overview ─────────────────────────────────────
# Open end-4 left sidebar — AI chat (Gemini/OpenAI/Mistral/Ollama),
# anime image search, translator. Set API keys via the settings cog
# inside the sidebar, or env vars: GOOGLE_AI_API_KEY, OPENAI_API_KEY,
# MISTRAL_API_KEY (read by `~/.config/quickshell/ii/services/ai/*ApiStrategy.qml`).
bind = SUPER, O,            global, quickshell:sidebarLeftToggle

# Right sidebar — notifications, quick toggles, calendar, todo, weather.
bind = SUPER, N,            global, quickshell:sidebarRightToggle

# Media controls popup.
bind = SUPER, M,            global, quickshell:mediaControlsToggle

# Workspaces overview (live previews of all workspaces).
bind = SUPER, Tab,          global, quickshell:overviewWorkspacesToggle

# ─── Visual / theme ───────────────────────────────────────────────
# Wallpaper selector (also generates material colors).
bind = CTRL SUPER, T,       global, quickshell:wallpaperSelectorToggle
# Random wallpaper.
bind = CTRL SUPER ALT, T,   global, quickshell:wallpaperSelectorRandom
# Toggle light/dark mode.
bind = CTRL SUPER SHIFT, D, global, quickshell:toggleLightDark
# Restart Quickshell (after a config edit).
bind = CTRL SUPER, R,       exec, killall qs quickshell 2>/dev/null; sleep 0.3; setsid qs -c ii >/dev/null 2>&1 &

# ─── Utilities ────────────────────────────────────────────────────
# OCR: select a screen region, extract text → clipboard.
bind = SUPER SHIFT, X,      global, quickshell:regionOcr
# Screen translate (overlay-based).
bind = SUPER SHIFT ALT, T,  global, quickshell:screenTranslate
# Color picker → clipboard (#RRGGBB).
bind = SUPER SHIFT, C,      exec, hyprpicker -a

# ─── Media keys (audio) ───────────────────────────────────────────
# These supplement HyDE's F10/F11/F12 + XF86 bindings with Super-mod variants.
bind = SUPER SHIFT, N,      exec, playerctl next
bind = SUPER SHIFT, B,      exec, playerctl previous
bind = SUPER SHIFT, M,      exec, wpctl set-mute @DEFAULT_SINK@ toggle
bind = SUPER ALT, M,        exec, wpctl set-mute @DEFAULT_SOURCE@ toggle

# ─── Merged cheatsheet hint ───────────────────────────────────────
# Super+/        → HyDE rofi keybind hint (existing HyDE bind)
# Super+Shift+/  → quick notify summary of end-4 bridge keys
bind = SUPER SHIFT, slash, exec, notify-send -t 12000 "8sync end-4 bridge keybinds" "Super+O → AI sidebar (left)\nSuper+N → notifications/quick toggles (right)\nSuper+M → media controls\nSuper+Tab → workspaces overview\nCtrl+Super+T → wallpaper selector\nCtrl+Super+R → restart Quickshell\nSuper+Shift+X → OCR text extract\nSuper+Shift+ALT+T → screen translate\nSuper+Shift+C → color picker\nSuper+Shift+N/B → next/prev track\nSuper+Shift+M / Super+ALT+M → toggle output/mic mute\n\nAI auth: open Super+O → settings cog → set Gemini/OpenAI/Mistral key, OR export GOOGLE_AI_API_KEY / OPENAI_API_KEY / MISTRAL_API_KEY before login.\n\nFull HyDE keybinds: Super+/"

# ─── 8sync palette cycler ─────────────────────────────────────────
# Cycles Hyprland border colors + kitty accent through 6 neon palettes:
#   cyber-cyan · tokyo-neon · synthwave · matrix-green · lava-orange · ice-violet
# State persists in ~/.config/hypr/.8sync-palette-index.
bind = CTRL SUPER SHIFT, Right, exec, ~/.local/share/8sync/8sync-palette-cycle.sh next
bind = CTRL SUPER SHIFT, Left,  exec, ~/.local/share/8sync/8sync-palette-cycle.sh prev
bind = CTRL SUPER SHIFT, P,     exec, ~/.local/share/8sync/8sync-palette-cycle.sh show
