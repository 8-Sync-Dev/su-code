name = "caelestia"
description = "Caelestia desktop — Hyprland + Quickshell + caelestia-shell + SDDM (extends `nvidia`)"

extends = ["nvidia"]

[packages]
pacman = [
  # Minimum Wayland session stack (Caelestia upstream README, "Manual installation")
  "hyprland",
  "xdg-desktop-portal-hyprland",
  "xdg-desktop-portal-gtk",
  "polkit-gnome",
  "pipewire",
  "pipewire-pulse",
  "pipewire-alsa",
  "wireplumber",
  "networkmanager",
  "bluez",
  "bluez-utils",
  # Display + login manager (Caelestia ships no DM; SDDM is the standard choice)
  "sddm",
  "qt6-svg",
  # Caelestia upstream deps (fish needed to run install.fish)
  "fish",
  "foot",
  "fastfetch",
  "starship",
  "btop",
  "jq",
  "eza",
  "wl-clipboard",
  "cliphist",
  "inotify-tools",
  "trash-cli",
  "hyprpicker",
  "adw-gtk-theme",
  "papirus-icon-theme",
  "ttf-jetbrains-mono-nerd",
]
aur = [
  # Single AUR meta-package — pulls in quickshell + caelestia-shell + caelestia-cli
  # + app2unit + qtengine-git + all transitive deps. Saves listing 8+ pkgs.
  "caelestia-meta",
]

[requires]
aur_helper = true

[services]
system_enable = ["sddm", "bluetooth", "NetworkManager"]
user_enable = []

[post_install]
commands = [
  # Clone caelestia-dots if missing (idempotent).
  """bash -c 'if [ ! -d "$HOME/.local/share/caelestia" ]; then \
git clone https://github.com/caelestia-dots/caelestia.git "$HOME/.local/share/caelestia"; \
else echo "[caelestia] dots already cloned — skip"; fi'""",
  # Run upstream installer non-interactively. `install.fish --noconfirm` is the
  # official auto-yes flag (skips every overwrite/backup prompt).
  """bash -c 'cd "$HOME/.local/share/caelestia" && fish ./install.fish --noconfirm --aur-helper=paru'""",
]
hint = "Fresh: reboot → SDDM → Hyprland session. Coexist: log out → pick `Hyprland` at your DM. Rollback: `8sync setup --caelestia=rollback`."
